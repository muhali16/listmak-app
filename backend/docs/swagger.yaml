      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Status filter
        in: query
        name: status
        type: string
      - description: Start date (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Listmak'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Get all listmaks
      tags:
      - listmaks
    post:
      consumes:
      - application/json
      description: Create a new listmak
      parameters:
      - description: Listmak data
        in: body
        name: listmak
        required: true
        schema:
          $ref: '#/definitions/models.Listmak'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.Listmak'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Create listmak
      tags:
      - listmaks
  /listmaks/{id}:
    delete:
      consumes:
      - application/json
      description: Delete listmak and related orders
      parameters:
      - description: Listmak ID
        in: path
        name: id
