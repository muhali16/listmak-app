                data:
                  $ref: '#/definitions/models.User'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.Response'
      summary: Google callback
      tags:
      - auth
  /auth/google/login:
    get:
      responses:
        "307":
          description: Temporary Redirect
      summary: Redirect to Google Login
      tags:
      - auth
  /auth/logout:
    get:
