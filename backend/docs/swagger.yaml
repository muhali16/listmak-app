basePath: /api/v1
definitions:
  models.Listmak:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      date:
        type: string
      id:
        type: integer
      orders:
        items:
          $ref: '#/definitions/models.Order'
        type: array
      paid_amount:
        type: number
      share_links:
        items:
          $ref: '#/definitions/models.ShareLink'
        type: array
      status:
        description: '''active'', ''completed'', ''cancelled'''
        type: string
      title:
        type: string
      total_amount:
        type: number
      total_orders:
        type: integer
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  models.Order:
    properties:
      added_at:
        type: string
      added_via:
        description: '''parse'', ''manual'', ''sharelink'''
        type: string
      id:
        type: integer
      is_paid:
        type: boolean
      listmak_id:
        type: integer
      name:
        type: string
      order_detail:
        type: string
      paid_at:
        type: string
      price:
        type: number
      qty:
        type: integer
      total_price:
        description: Generated column supported in postgres/mysql 5.7+
        type: number
      updated_at:
        type: string
    type: object
  models.ShareLink:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      expires_at:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      listmak:
        $ref: '#/definitions/models.Listmak'
      listmak_id:
        type: integer
      share_id:
        type: string
      title:
        type: string
    type: object
  models.SystemLog:
    properties:
      client_ip:
        type: string
      created_at:
        type: string
      error_msg:
        type: string
      id:
        type: integer
      latency:
        type: string
      method:
        type: string
      path:
        type: string
      request_id:
        description: ID Unik per request
        type: string
      status_code:
        type: integer
    type: object
  models.User:
    properties:
      avatar:
        type: string
      created_at:
        type: string
      email:
        type: string
      google_id:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  models.ViewShare:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      id:
        type: integer
      listmak:
        $ref: '#/definitions/models.Listmak'
      listmak_id:
        type: integer
      snapshot_data:
        description: Menggunakan jsonb untuk postgres atau json untuk mysql
        type: object
      title:
        type: string
      view_id:
        type: string
    type: object
  utils.Response:
    properties:
      code:
        type: integer
      data: {}
      latency:
        type: string
      message:
        type: string
      request_id:
        type: string
      success:
        type: boolean
    type: object
host: localhost:9001
info:
  contact: {}
  description: API Server untuk manajemen Listmak
  title: Listmak Service API
  version: "1.0"
paths:
  /auth/google/callback:
    get:
      consumes:
      - application/json
      description: Google callback
      produces:
      - application/json
