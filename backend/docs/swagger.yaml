  /listmaks/{id}/orders/paid:
    patch:
      consumes:
      - application/json
      description: Set is_paid for all orders belonging to a name within a listmak
        (name matched case-insensitively, trimmed). All-or-nothing.
      parameters:
      - description: Listmak ID
        in: path
        name: id
        required: true
